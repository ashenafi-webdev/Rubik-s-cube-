<!doctype html>
<html lang="en"> 
 <head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>CFOP Pro Cube</title> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script> 
  <style>
        :root {
            --bg-top: #1a1a1a;
            --bg-bottom: #000000;
            --ui-bg: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, var(--bg-top), var(--bg-bottom));
            color: white;
        }

        #canvas-container { width: 100vw; height: 100vh; }

        .hud {
            position: absolute;
            background: var(--ui-bg);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            z-index: 5;
        }

        #top-bar {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none;
        }

        /* Moved controls to the side to stop covering the cube */
        #controls {
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
            font-size: 0.9em;
        }

        button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

        .btn-white  { background: #FFFFFF; color: #333; }
        .btn-yellow { background: #FFD500; color: #333; }
        .btn-green  { background: #009B48; color: white; }
        .btn-blue   { background: #0046AD; color: white; }
        .btn-orange { background: #FF5800; color: white; }
        .btn-red    { background: #B71234; color: white; }
        .secondary-btn { background: #444; color: white; }
        .solve-btn { background: #6e44ff; color: white; margin-top: 10px; }

        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden { display: none; }
        .big-btn { padding: 20px 50px; font-size: 1.5em; background: #009B48; color: white; }
        
        #hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 0.8em;
            opacity: 0.5;
        }
    </style> 
 </head> 
 <body> 
  <div id="canvas-container"></div> 
  
  <div id="top-bar" class="hud"> 
   <div id="moves">Moves: 0</div> 
   <div id="timer">Time: 0:00</div> 
  </div> 

  <div id="controls" class="hud hidden"> 
   <div class="btn-grid"> 
     <button class="btn-yellow" onclick="game.rotateFace('U')" oncontextmenu="game.handleRightClick(event, 'U')">U</button> 
     <button class="btn-white" onclick="game.rotateFace('D')" oncontextmenu="game.handleRightClick(event, 'D')">D</button> 
     <button class="btn-green" onclick="game.rotateFace('F')" oncontextmenu="game.handleRightClick(event, 'F')">F</button> 
     <button class="btn-blue" onclick="game.rotateFace('B')" oncontextmenu="game.handleRightClick(event, 'B')">B</button> 
     <button class="btn-red" onclick="game.rotateFace('L')" oncontextmenu="game.handleRightClick(event, 'L')">L</button> 
     <button class="btn-orange" onclick="game.rotateFace('R')" oncontextmenu="game.handleRightClick(event, 'R')">R</button> 
   </div> 
   <button class="secondary-btn" onclick="game.shuffle()">Scramble</button> 
   <button class="solve-btn" onclick="game.solveBack()">Slow Solve</button> 
  </div> 

  <div id="start-screen" class="screen"> 
   <h1 style="color: #FFD500;">CFOP CUBE</h1> 
   <p style="text-align: center;">Yellow Top | White Bottom<br>Keys: U, D, F, B, L, R (+Shift for CCW)</p> 
   <button class="big-btn" onclick="game.start()">Start</button> 
  </div> 

  <div id="hint">Drag background to orbit camera</div>

  <script>
        class RubiksCube {
            constructor() {
                this.moveHistory = [];
                this.moves = 0;
                this.timer = 0;
                this.isAnimating = false;
                this.gameStarted = false;
                this.init();
                this.initKeyboard();
            }

            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(6, 5, 10);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                document.getElementById("canvas-container").appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const sun = new THREE.PointLight(0xffffff, 0.5);
                sun.position.set(10, 20, 10);
                this.scene.add(sun);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                
                this.createCube();
                window.addEventListener("resize", () => this.onResize());
                this.animate();
            }

            initKeyboard() {
                window.addEventListener('keydown', (e) => {
                    if (!this.gameStarted || this.isAnimating) return;
                    const key = e.key.toUpperCase();
                    const direction = e.shiftKey ? -1 : 1;
                    if (['U', 'D', 'F', 'B', 'L', 'R'].includes(key)) {
                        this.rotateFace(key, direction);
                    }
                });
            }

            createCube() {
                if (this.cubeGroup) this.scene.remove(this.cubeGroup);
                this.cubeGroup = new THREE.Group();
                this.cubelets = [];

                const palette = {
                    white:  new THREE.MeshLambertMaterial({ color: 0xFFFFFF }), // Bottom
                    yellow: new THREE.MeshLambertMaterial({ color: 0xFFD500 }), // Top
                    red:    new THREE.MeshLambertMaterial({ color: 0xB71234 }), // Left
                    orange: new THREE.MeshLambertMaterial({ color: 0xFF5800 }), // Right
                    green:  new THREE.MeshLambertMaterial({ color: 0x009B48 }), // Front
                    blue:   new THREE.MeshLambertMaterial({ color: 0x0046AD }), // Back
                    black:  new THREE.MeshLambertMaterial({ color: 0x111111 })
                };

                for (let x = -1; x <= 1; x++) {
                    for (let y = -1; y <= 1; y++) {
                        for (let z = -1; z <= 1; z++) {
                            const materials = [
                                x === 1  ? palette.orange : palette.black,
                                x === -1 ? palette.red    : palette.black,
                                y === 1  ? palette.yellow : palette.black, // Yellow Top
                                y === -1 ? palette.white  : palette.black, // White Bottom
                                z === 1  ? palette.green  : palette.black,
                                z === -1 ? palette.blue   : palette.black
                            ];

                            const geometry = new THREE.BoxGeometry(0.96, 0.96, 0.96);
                            const cubelet = new THREE.Mesh(geometry, materials);
                            cubelet.position.set(x, y, z);
                            this.cubeGroup.add(cubelet);
                            this.cubelets.push(cubelet);
                        }
                    }
                }
                this.scene.add(this.cubeGroup);
            }

            handleRightClick(event, face) {
                event.preventDefault();
                this.rotateFace(face, -1);
            }

            rotateFace(face, direction = 1, isSolving = false) {
                if (this.isAnimating) return;
                this.isAnimating = true;

                if (!isSolving) this.moveHistory.push({ face, direction });

                const pivot = new THREE.Group();
                this.cubeGroup.add(pivot);

                const activeCubelets = this.cubelets.filter(c => {
                    const pos = new THREE.Vector3();
                    c.getWorldPosition(pos);
                    if (face === "R") return pos.x > 0.5;
                    if (face === "L") return pos.x < -0.5;
                    if (face === "U") return pos.y > 0.5;
                    if (face === "D") return pos.y < -0.5;
                    if (face === "F") return pos.z > 0.5;
                    if (face === "B") return pos.z < -0.5;
                });

                activeCubelets.forEach(c => pivot.attach(c));

                const axisMap = { 
                    R: [1, 0, 0], L: [-1, 0, 0], U: [0, 1, 0], 
                    D: [0, -1, 0], F: [0, 0, 1], B: [0, 0, -1] 
                };
                
                const axis = new THREE.Vector3(...axisMap[face]);
                const targetAngle = (Math.PI / 2) * direction;
                let currentAngle = 0;
                
                // SLOW SPEED for solve back
                const speed = isSolving ? 0.04 : 0.22;

                const animateTurn = () => {
                    const step = speed * Math.sign(targetAngle);
                    if (Math.abs(currentAngle + step) < Math.abs(targetAngle)) {
                        currentAngle += step;
                        pivot.rotateOnAxis(axis, Math.abs(step) * Math.sign(direction));
                        requestAnimationFrame(animateTurn);
                    } else {
                        pivot.rotateOnAxis(axis, targetAngle - currentAngle);
                        const temp = [...pivot.children];
                        temp.forEach(c => {
                            this.cubeGroup.attach(c);
                            c.position.set(Math.round(c.position.x), Math.round(c.position.y), Math.round(c.position.z));
                        });
                        this.cubeGroup.remove(pivot);
                        this.isAnimating = false;
                        
                        if (this.gameStarted && !isSolving) {
                            this.moves++;
                            document.getElementById("moves").textContent = `Moves: ${this.moves}`;
                        }
                    }
                };
                animateTurn();
            }

            solveBack() {
                if (this.isAnimating || this.moveHistory.length === 0) return;
                this.gameStarted = false;
                this.stopTimer();

                const reverseMove = () => {
                    if (this.moveHistory.length > 0) {
                        const lastMove = this.moveHistory.pop();
                        this.rotateFace(lastMove.face, lastMove.direction * -1, true);
                        setTimeout(reverseMove, 900); // Wait for the slow turn
                    } else {
                        this.moves = 0;
                        document.getElementById("moves").textContent = "Moves: 0";
                        this.gameStarted = true;
                        this.startTimer();
                    }
                };
                reverseMove();
            }

            shuffle() {
                if (this.isAnimating) return;
                this.gameStarted = false;
                this.moveHistory = [];
                let count = 0;
                const faces = ["F","B","U","D","L","R"];
                const doShuffle = () => {
                    if (count < 15) {
                        this.rotateFace(faces[Math.floor(Math.random()*6)], Math.random() > 0.5 ? 1 : -1);
                        count++;
                        setTimeout(doShuffle, 120);
                    } else {
                        this.gameStarted = true;
                        this.moves = 0;
                        document.getElementById("moves").textContent = "Moves: 0";
                        this.startTimer();
                    }
                };
                doShuffle();
            }

            start() {
                document.getElementById("start-screen").classList.add("hidden");
                document.getElementById("controls").classList.remove("hidden");
                this.shuffle();
            }

            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timer = 0;
                this.timerInterval = setInterval(() => {
                    this.timer++;
                    const m = Math.floor(this.timer/60);
                    const s = this.timer%60;
                    document.getElementById("timer").textContent = `Time: ${m}:${s.toString().padStart(2,"0")}`;
                }, 1000);
            }

            stopTimer() { clearInterval(this.timerInterval); }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        const game = new RubiksCube();
    </script> 
 
</body></html>
