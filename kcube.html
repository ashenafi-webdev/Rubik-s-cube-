<!doctype html>
<html lang="en"> 
 <head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Bold Smooth Cube - Pro Edition</title> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script> 
  <style>
        :root {
            --bg-top: #1a1a1a;
            --bg-bottom: #000000;
            --ui-bg: rgba(255, 255, 255, 0.15);
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, var(--bg-top), var(--bg-bottom));
            color: white;
        }

        #canvas-container { width: 100vw; height: 100vh; }

        .hud {
            position: absolute;
            background: var(--ui-bg);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-weight: bold;
            pointer-events: none;
        }

        #top-bar {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 5;
        }

        #controls {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            text-align: center;
        }

        button {
            padding: 12px 18px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            user-select: none;
        }

        button:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

        .btn-green  { background: #009B48; color: white; }
        .btn-blue   { background: #0046AD; color: white; }
        .btn-white  { background: #FFFFFF; color: #333; }
        .btn-yellow { background: #FFD500; color: #333; }
        .btn-orange { background: #FF5800; color: white; }
        .btn-red    { background: #B71234; color: white; }

        .secondary-btn { background: #444; color: white; margin-top: 15px; }

        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .hidden { display: none; }
        .big-btn { padding: 20px 50px; font-size: 1.5em; background: #009B48; color: white; }
        
        #keyboard-hint {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 0.8em;
            opacity: 0.6;
        }
    </style> 
 </head> 
 <body> 
  <div id="canvas-container"></div> 
  <div id="top-bar" class="hud"> 
   <div id="moves">Moves: 0</div> 
   <div id="timer">Time: 0:00</div> 
  </div> 

  <div id="controls" class="hud hidden"> 
   <div> 
     <button class="btn-white" onclick="game.rotateFace('U')" oncontextmenu="game.handleRightClick(event, 'U')">Up (U)</button> 
     <button class="btn-yellow" onclick="game.rotateFace('D')" oncontextmenu="game.handleRightClick(event, 'D')">Down (D)</button> 
     <button class="btn-green" onclick="game.rotateFace('F')" oncontextmenu="game.handleRightClick(event, 'F')">Front (F)</button> 
   </div> 
   <div> 
     <button class="btn-blue" onclick="game.rotateFace('B')" oncontextmenu="game.handleRightClick(event, 'B')">Back (B)</button> 
     <button class="btn-red" onclick="game.rotateFace('L')" oncontextmenu="game.handleRightClick(event, 'L')">Left (L)</button> 
     <button class="btn-orange" onclick="game.rotateFace('R')" oncontextmenu="game.handleRightClick(event, 'R')">Right (R)</button> 
   </div> 
   <button class="secondary-btn" onclick="game.shuffle()">Scramble</button> 
   <button class="secondary-btn" onclick="game.solveBack()">Slow Reset (Solve)</button> 
  </div> 

  <div id="start-screen" class="screen"> 
   <h1 style="font-size: 4em; color: #FFD500;">RUBIK'S</h1> 
   <p style="margin-bottom: 2em; text-align: center;">
     Keyboard: U, D, F, B, L, R (+ Shift for CCW)<br>
     Left Click: Rotate CW | Right Click: Rotate CCW<br>
     Drag Background: Orbit Camera
   </p> 
   <button class="big-btn" onclick="game.start()">Start Game</button> 
  </div> 

  <div id="win-screen" class="screen hidden"> 
   <h2 style="font-size: 3em; color: #009B48;">SOLVED!</h2> 
   <p id="win-stats" style="font-size: 1.5em;"></p> 
   <button class="big-btn" onclick="game.playAgain()">One More Round</button> 
  </div>

  <div id="keyboard-hint">Keys: U D F B L R | Hold Shift to Reverse</div>

  <script>
        class RubiksCube {
            constructor() {
                this.moveHistory = []; // Track moves for the reset button
                this.moves = 0;
                this.timer = 0;
                this.isAnimating = false;
                this.gameStarted = false;
                this.init();
                this.initKeyboard();
            }

            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(5, 5, 8);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                document.getElementById("canvas-container").appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const sun = new THREE.DirectionalLight(0xffffff, 0.5);
                sun.position.set(5, 10, 7);
                this.scene.add(sun);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;

                this.createCube();
                window.addEventListener("resize", () => this.onResize());
                this.animate();
            }

            initKeyboard() {
                window.addEventListener('keydown', (e) => {
                    if (!this.gameStarted || this.isAnimating) return;
                    const key = e.key.toUpperCase();
                    const direction = e.shiftKey ? -1 : 1;
                    const faces = ['U', 'D', 'F', 'B', 'L', 'R'];
                    if (faces.includes(key)) {
                        this.rotateFace(key, direction);
                    }
                });
            }

            createCube() {
                if (this.cubeGroup) this.scene.remove(this.cubeGroup);
                this.cubeGroup = new THREE.Group();
                this.cubelets = [];

                const palette = {
                    white:  new THREE.MeshLambertMaterial({ color: 0xFFFFFF }),
                    yellow: new THREE.MeshLambertMaterial({ color: 0xFFD500 }),
                    red:    new THREE.MeshLambertMaterial({ color: 0xB71234 }),
                    orange: new THREE.MeshLambertMaterial({ color: 0xFF5800 }),
                    green:  new THREE.MeshLambertMaterial({ color: 0x009B48 }),
                    blue:   new THREE.MeshLambertMaterial({ color: 0x0046AD }),
                    black:  new THREE.MeshLambertMaterial({ color: 0x111111 })
                };

                for (let x = -1; x <= 1; x++) {
                    for (let y = -1; y <= 1; y++) {
                        for (let z = -1; z <= 1; z++) {
                            const materials = [
                                x === 1  ? palette.orange : palette.black,
                                x === -1 ? palette.red    : palette.black,
                                y === 1  ? palette.white  : palette.black,
                                y === -1 ? palette.yellow : palette.black,
                                z === 1  ? palette.green  : palette.black,
                                z === -1 ? palette.blue   : palette.black
                            ];

                            const geometry = new THREE.BoxGeometry(0.97, 0.97, 0.97);
                            const cubelet = new THREE.Mesh(geometry, materials);
                            cubelet.position.set(x, y, z);
                            this.cubeGroup.add(cubelet);
                            this.cubelets.push(cubelet);
                        }
                    }
                }
                this.scene.add(this.cubeGroup);
            }

            handleRightClick(event, face) {
                event.preventDefault();
                this.rotateFace(face, -1);
            }

            // Added 'isSolving' parameter to adjust speed
            rotateFace(face, direction = 1, isSolving = false) {
                if (this.isAnimating) return;
                this.isAnimating = true;

                // Log move for the reset/solve history
                if (!isSolving) {
                    this.moveHistory.push({ face, direction });
                }

                const pivot = new THREE.Group();
                this.cubeGroup.add(pivot);

                const activeCubelets = this.cubelets.filter(c => {
                    const pos = new THREE.Vector3();
                    c.getWorldPosition(pos);
                    if (face === "R") return pos.x > 0.5;
                    if (face === "L") return pos.x < -0.5;
                    if (face === "U") return pos.y > 0.5;
                    if (face === "D") return pos.y < -0.5;
                    if (face === "F") return pos.z > 0.5;
                    if (face === "B") return pos.z < -0.5;
                });

                activeCubelets.forEach(c => pivot.attach(c));

                const axisMap = { 
                    R: [1, 0, 0], L: [-1, 0, 0], U: [0, 1, 0], 
                    D: [0, -1, 0], F: [0, 0, 1], B: [0, 0, -1] 
                };
                
                const axis = new THREE.Vector3(...axisMap[face]);
                const targetAngle = (Math.PI / 2) * direction;
                let currentAngle = 0;
                
                // Cinematic slow speed for solving vs fast speed for playing
                const speed = isSolving ? 0.05 : 0.25;

                const animateTurn = () => {
                    const step = speed * Math.sign(targetAngle);
                    if (Math.abs(currentAngle + step) < Math.abs(targetAngle)) {
                        currentAngle += step;
                        pivot.rotateOnAxis(axis, Math.abs(step) * Math.sign(direction));
                        requestAnimationFrame(animateTurn);
                    } else {
                        pivot.rotateOnAxis(axis, targetAngle - currentAngle);
                        const temp = [...pivot.children];
                        temp.forEach(c => {
                            this.cubeGroup.attach(c);
                            c.position.set(Math.round(c.position.x * 10) / 10, Math.round(c.position.y * 10) / 10, Math.round(c.position.z * 10) / 10);
                        });
                        this.cubeGroup.remove(pivot);
                        this.isAnimating = false;
                        
                        if (this.gameStarted && !isSolving) {
                            this.moves++;
                            document.getElementById("moves").textContent = `Moves: ${this.moves}`;
                        }
                    }
                };
                animateTurn();
            }

            // Rewind the history stack slowly
            solveBack() {
                if (this.isAnimating || this.moveHistory.length === 0) return;
                
                this.gameStarted = false; // Stop timer while solving
                this.stopTimer();

                const reverseMove = () => {
                    if (this.moveHistory.length > 0) {
                        const lastMove = this.moveHistory.pop();
                        // Rotate same face, opposite direction
                        this.rotateFace(lastMove.face, lastMove.direction * -1, true);
                        
                        // Wait for slow animation to finish before next move
                        // (PI/2 / 0.05 speed is roughly 32 frames)
                        setTimeout(reverseMove, 800); 
                    } else {
                        this.moves = 0;
                        document.getElementById("moves").textContent = "Moves: 0";
                        this.moveHistory = [];
                        this.gameStarted = true;
                        this.startTimer();
                    }
                };
                reverseMove();
            }

            shuffle() {
                if (this.isAnimating) return;
                this.gameStarted = false;
                this.moveHistory = []; // Clear history on new scramble
                let count = 0;
                const faces = ["F","B","U","D","L","R"];
                const doShuffle = () => {
                    if (count < 15) {
                        this.rotateFace(faces[Math.floor(Math.random()*6)], Math.random() > 0.5 ? 1 : -1);
                        count++;
                        setTimeout(doShuffle, 150);
                    } else {
                        this.gameStarted = true;
                        this.moves = 0;
                        document.getElementById("moves").textContent = "Moves: 0";
                        this.startTimer();
                    }
                };
                doShuffle();
            }

            start() {
                document.getElementById("start-screen").classList.add("hidden");
                document.getElementById("controls").classList.remove("hidden");
                this.shuffle();
            }

            playAgain() { location.reload(); }

            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timer = 0;
                this.timerInterval = setInterval(() => {
                    this.timer++;
                    const m = Math.floor(this.timer/60);
                    const s = this.timer%60;
                    document.getElementById("timer").textContent = `Time: ${m}:${s.toString().padStart(2,"0")}`;
                }, 1000);
            }

            stopTimer() { clearInterval(this.timerInterval); }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        const game = new RubiksCube();
    </script> 
 
</body></html>
